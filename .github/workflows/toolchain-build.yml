name: Build Toolchains

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux amd64
            os: ubuntu-24.04
            artifact_name: sdcc-linux-amd64
            archive_name: sdcc-linux-amd64.tar.xz
          - name: windows amd64
            os: windows-latest
            artifact_name: sdcc-windows-amd64
            archive_name: sdcc-windows-amd64.tar.xz
          - name: macos arm64
            os: macos-14
            artifact_name: sdcc-macos-arm64
            archive_name: sdcc-macos-arm64.tar.xz

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            bison
            flex
            git
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-python
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            flex \
            g++ \
            gcc \
            libboost-dev \
            make \
            python3 \
            zlib1g-dev
        shell: bash

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          brew install bison boost flex gcc make zlib
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Build and package on Unix
        if: runner.os != 'Windows'
        run: |
          set -euxo pipefail
          SRC_DIR="$GITHUB_WORKSPACE"
          BUILD_DIR="$SRC_DIR/build/${{ matrix.artifact_name }}"
          PREFIX_DIR="$SRC_DIR/out/${{ matrix.artifact_name }}"
          CPP_SHIM="$BUILD_DIR/sdcpp-host.sh"

          mkdir -p "$BUILD_DIR" "$PREFIX_DIR"
          cd "$BUILD_DIR"

          if [ "$RUNNER_OS" = "macOS" ]; then
            GCC_BIN_DIR="$(brew --prefix gcc)/bin"
            export CC="$(printf '%s\n' "$GCC_BIN_DIR"/gcc-[0-9]* | sort -V | tail -n1)"
            export CXX="$(printf '%s\n' "$GCC_BIN_DIR"/g++-[0-9]* | sort -V | tail -n1)"
            export CPPFLAGS="-I$(brew --prefix zlib)/include -I$(brew --prefix boost)/include"
            export LDFLAGS="-L$(brew --prefix zlib)/lib -L$(brew --prefix boost)/lib"
          fi

          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'force_c23=0' \
            'translated=()' \
            'for arg in "$@"; do' \
            '  if [[ "$arg" == --obj-ext=* ]]; then' \
            '    continue' \
            '  fi' \
            '  if [[ "$arg" == "-std=c23" ]]; then' \
            '    arg="-std=c2x"' \
            '    force_c23=1' \
            '  fi' \
            '  translated+=("$arg")' \
            'done' \
            'if (( force_c23 )); then' \
            '  translated+=("-Wno-builtin-macro-redefined" "-D__STDC_VERSION__=202311L")' \
            'fi' \
            'exec "${SDCPP_REAL:-gcc}" -E -U__GNUC__ -U__GNUC_MINOR__ -U__GNUC_PATCHLEVEL__ -U__clang__ -U__llvm__ "${translated[@]}"' \
            > "$CPP_SHIM"
          chmod +x "$CPP_SHIM"
          export SDCPP_REAL="${CC:-gcc}"
          export SDCPP_CPP="$CPP_SHIM"

          PORT_DISABLE_FLAGS=(
            --disable-z80-port
            --disable-z180-port
            --disable-r2k-port
            --disable-r2ka-port
            --disable-r3ka-port
            --disable-r4k-port
            --disable-r5k-port
            --disable-r6k-port
            --disable-sm83-port
            --disable-tlcs90-port
            --disable-ez80-port
            --disable-z80n-port
            --disable-r800-port
            --disable-ds390-port
            --disable-ds400-port
            --disable-pic14-port
            --disable-pic16-port
            --disable-hc08-port
            --disable-s08-port
            --disable-stm8-port
            --disable-pdk13-port
            --disable-pdk14-port
            --disable-pdk15-port
            --disable-pdk16-port
            --disable-mos6502-port
            --disable-mos65c02-port
            --disable-f8-port
            --disable-f8l-port
            --disable-non-free
          )

          if ! "$SRC_DIR/configure" \
            --prefix="$PREFIX_DIR" \
            --disable-sdcdb \
            --disable-sdcpp \
            --disable-ucsim \
            "${PORT_DISABLE_FLAGS[@]}"; then
            cat config.log
            exit 1
          fi

          make -j"$(getconf _NPROCESSORS_ONLN || sysctl -n hw.ncpu || echo 3)"
          make install
          install -m 755 "$CPP_SHIM" "$PREFIX_DIR/bin/sdcpp"

          tar -C "$PREFIX_DIR" -cJf "$SRC_DIR/${{ matrix.archive_name }}" .
        shell: bash

      - name: Build and package on Windows
        if: runner.os == 'Windows'
        run: |
          set -euxo pipefail
          SRC_DIR="$(cygpath -u "$GITHUB_WORKSPACE")"
          BUILD_DIR="$SRC_DIR/build/${{ matrix.artifact_name }}"
          PACKAGE_DIR="$SRC_DIR/out/${{ matrix.artifact_name }}"
          CPP_SHIM="$BUILD_DIR/sdcpp-host.sh"

          mkdir -p "$BUILD_DIR" "$PACKAGE_DIR"
          cd "$BUILD_DIR"

          export CPPFLAGS="-I/mingw64/include"
          export LDFLAGS="-L/mingw64/lib"
          export CC="gcc"
          export CXX="g++"
          export sdccconf_h_dir_separator='\\'
          export docdir='${datarootdir}/doc'
          export include_dir_suffix='include'
          export non_free_include_dir_suffix='non-free/include'
          export lib_dir_suffix='lib'
          export non_free_lib_dir_suffix='non-free/lib'

          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'force_c23=0' \
            'translated=()' \
            'for arg in "$@"; do' \
            '  if [[ "$arg" == "-std=c23" ]]; then' \
            '    arg="-std=c2x"' \
            '    force_c23=1' \
            '  fi' \
            '  translated+=("$arg")' \
            'done' \
            'if (( force_c23 )); then' \
            '  translated+=("-Wno-builtin-macro-redefined" "-D__STDC_VERSION__=202311L")' \
            'fi' \
            'exec "${SDCPP_REAL:-gcc}" -E -U__GNUC__ -U__GNUC_MINOR__ -U__GNUC_PATCHLEVEL__ -U__clang__ -U__llvm__ "${translated[@]}"' \
            > "$CPP_SHIM"
          chmod +x "$CPP_SHIM"
          export SDCPP_REAL="gcc"
          export SDCPP_CPP="$CPP_SHIM"

          PORT_DISABLE_FLAGS=(
            --disable-z80-port
            --disable-z180-port
            --disable-r2k-port
            --disable-r2ka-port
            --disable-r3ka-port
            --disable-r4k-port
            --disable-r5k-port
            --disable-r6k-port
            --disable-sm83-port
            --disable-tlcs90-port
            --disable-ez80-port
            --disable-z80n-port
            --disable-r800-port
            --disable-ds390-port
            --disable-ds400-port
            --disable-pic14-port
            --disable-pic16-port
            --disable-hc08-port
            --disable-s08-port
            --disable-stm8-port
            --disable-pdk13-port
            --disable-pdk14-port
            --disable-pdk15-port
            --disable-pdk16-port
            --disable-mos6502-port
            --disable-mos65c02-port
            --disable-f8-port
            --disable-f8l-port
            --disable-non-free
          )

          if ! "$SRC_DIR/configure" \
            --prefix=/sdcc \
            --datarootdir=/sdcc \
            --disable-sdcdb \
            --disable-sdcpp \
            --disable-ucsim \
            "${PORT_DISABLE_FLAGS[@]}"; then
            cat config.log
            exit 1
          fi

          mkdir -p "$BUILD_DIR/bin"
          printf '%s\n' \
            '#include <process.h>' \
            '#include <stdio.h>' \
            '#include <stdlib.h>' \
            '#include <string.h>' \
            '' \
            'int main(int argc, char **argv)' \
            '{' \
            '  const char *real = getenv("SDCPP_REAL");' \
            '  int extra = 10;' \
            '  char **args = (char **)calloc((size_t)argc + extra, sizeof(char *));' \
            '  int j = 0;' \
            '  int rc;' \
            '  int force_c23 = 0;' \
            '' \
            '  if (!args)' \
            '    return 1;' \
            '' \
            '  args[j++] = (char *)((real && *real) ? real : "gcc");' \
            '  args[j++] = "-E";' \
            '  args[j++] = "-U__GNUC__";' \
            '  args[j++] = "-U__GNUC_MINOR__";' \
            '  args[j++] = "-U__GNUC_PATCHLEVEL__";' \
            '  args[j++] = "-U__clang__";' \
            '  args[j++] = "-U__llvm__";' \
            '  for (int i = 1; i < argc; i++)' \
            '    {' \
            '      if (strncmp(argv[i], "--obj-ext=", 10) == 0)' \
            '        continue;' \
            '      if (strcmp(argv[i], "-std=c23") == 0)' \
            '        {' \
            '          args[j++] = "-std=c2x";' \
            '          force_c23 = 1;' \
            '        }' \
            '      else' \
            '        args[j++] = argv[i];' \
            '    }' \
            '  if (force_c23)' \
            '    {' \
            '      args[j++] = "-Wno-builtin-macro-redefined";' \
            '      args[j++] = "-D__STDC_VERSION__=202311L";' \
            '    }' \
            '  args[j] = NULL;' \
            '' \
            '  rc = _spawnvp(_P_WAIT, args[0], (const char * const *)args);' \
            '  free(args);' \
            '  return rc == -1 ? 1 : rc;' \
            '}' \
            > "$BUILD_DIR/sdcpp-host.c"
          gcc -O2 -o "$BUILD_DIR/bin/sdcpp.exe" "$BUILD_DIR/sdcpp-host.c"

          make -j"$(nproc)"
          make install DESTDIR="$PACKAGE_DIR"
          install -m 755 "$BUILD_DIR/bin/sdcpp.exe" "$PACKAGE_DIR/sdcc/bin/sdcpp.exe"

          tar -C "$PACKAGE_DIR/sdcc" -cJf "$SRC_DIR/${{ matrix.archive_name }}" .
        shell: msys2 {0}

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/${{ matrix.archive_name }}
          if-no-files-found: error
